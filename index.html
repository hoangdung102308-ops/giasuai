<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cô Giáo Xuân Mai AI - Kho Đề Thi & Trợ Giảng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col">

    <!-- Cấu hình hệ thống (Future-Proofing) -->
    <script>
        const APP_CONFIG = {
            model: "gemini-2.5-flash", // Cập nhật tên model mới nhất tại đây (ví dụ: gemini-3.0-pro)
            apiDocsUrl: "https://aistudio.google.com/"
        };
    </script>

    <!-- Header -->
    <div class="bg-teal-600 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <h1 class="font-bold">👩‍🏫 XUÂN MAI AI</h1>
            <button onclick="showApiGuide()" class="bg-white/20 px-3 py-1 rounded-full text-xs font-semibold hover:bg-white/30">Lấy API Free</button>
        </div>
        
        <!-- Bộ lọc -->
        <div class="max-w-3xl mx-auto mt-3 flex gap-2">
            <select id="gradeSelect" class="text-xs p-2 rounded-lg text-slate-900 w-1/3" onchange="renderExams()">
                <option value="6">Lớp 6</option><option value="7">Lớp 7</option><option value="8">Lớp 8</option><option value="9">Lớp 9</option>
                <option value="10">Lớp 10</option><option value="11">Lớp 11</option><option value="12" selected>Lớp 12</option>
            </select>
            <select id="subjectSelect" class="text-xs p-2 rounded-lg text-slate-900 flex-1" onchange="renderExams()">
                <option value="Toán Học">Toán Học</option><option value="Ngữ Văn">Ngữ Văn</option><option value="Tiếng Anh">Tiếng Anh</option>
            </select>
        </div>
    </div>

    <!-- Nội dung chính -->
    <div id="mainView" class="flex-1 overflow-y-auto p-4 max-w-3xl mx-auto w-full custom-scrollbar">
        <div id="examList" class="space-y-4">
            <!-- Đề thi sẽ load ở đây -->
        </div>
    </div>

    <!-- Modal Hướng dẫn API -->
    <div id="apiModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl max-w-sm w-full space-y-4">
            <h2 class="font-bold text-lg text-teal-600">Lấy API Gemini Miễn Phí</h2>
            <ol class="text-sm space-y-2 text-slate-600 list-decimal pl-4">
                <li>Truy cập: <a href="https://aistudio.google.com/" target="_blank" class="text-blue-500 underline">Google AI Studio</a></li>
                <li>Đăng nhập tài khoản Google.</li>
                <li>Chọn <b>"Get API Key"</b> -> <b>"Create API key"</b>.</li>
                <li>Copy mã Key và dán vào ô bên dưới.</li>
            </ol>
            <p class="text-[10px] text-slate-400"><i>* Chính sách Google: Sử dụng miễn phí theo hạn mức hiện tại.</i></p>
            <button onclick="document.getElementById('apiModal').classList.add('hidden')" class="w-full bg-slate-800 text-white p-2 rounded-lg">Đã hiểu</button>
        </div>
    </div>

    <script>
        // Dữ liệu mẫu - Em hãy mở rộng mảng này (Hàng ngàn đề cũng được)
        const examsData = [
            { id: "01", grade: "12", subject: "Toán Học", school: "THPT Chuyên Hà Nội", title: "Đề thi thử 2026", content: "Đề bài tập logarit...", sol: "Lời giải chi tiết..." },
            { id: "02", grade: "12", subject: "Toán Học", school: "THPT Lê Hồng Phong", title: "Đề khảo sát tháng 5", content: "Giải tích...", sol: "Lời giải..." }
        ];

        function renderExams() {
            const list = document.getElementById('examList');
            const g = document.getElementById('gradeSelect').value;
            const s = document.getElementById('subjectSelect').value;
            list.innerHTML = "";

            const filtered = examsData.filter(e => e.grade === g && e.subject === s);
            
            filtered.forEach(ex => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-200";
                div.innerHTML = `
                    <div class="font-bold text-teal-700">Đề ${ex.id}: ${ex.title}</div>
                    <div class="text-xs text-slate-500">${ex.school}</div>
                    <div class="mt-3 flex gap-2">
                        <button onclick="alert('${ex.content}')" class="bg-teal-50 text-teal-700 px-3 py-1 rounded text-xs font-bold">Xem Đề</button>
                        <button onclick="alert('${ex.sol}')" class="bg-rose-50 text-rose-700 px-3 py-1 rounded text-xs font-bold">Xem Lời Giải</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function showApiGuide() { document.getElementById('apiModal').classList.remove('hidden'); }
        
        // Gọi API với cấu hình linh hoạt
        async function callGemini(prompt) {
            const apiKey = localStorage.getItem('user_gemini_key');
            const url = `https://generativelanguage.googleapis.com/v1/models/${APP_CONFIG.model}:generateContent?key=${apiKey}`;
            // ... (Phần logic gọi API giữ nguyên như cũ)
        }

        renderExams();
    </script>
</body>
</html>
