<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Hello Kitty Gia Sư</title>
    <link rel="manifest" href='data:application/json,{"name":"Hello Kitty Gia Sư","short_name":"KittyGiaSu","start_url":".","display":"standalone","background_color":"#fff5f7","theme_color":"#f472b6","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/763/763731.png","sizes":"192x192","type":"image/png"}]}'>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-50 h-screen flex flex-col font-sans select-none">

    <div class="bg-pink-300 text-pink-900 p-4 shadow-md sticky top-0 z-50 rounded-b-2xl border-b-2 border-pink-400">
        <h1 class="text-md font-bold text-center">🎀 HELLO KITTY GIA SƯ</h1>
        <input id="apiKeyInput" type="password" placeholder="Dán API Key..." class="w-full mt-2 p-1.5 text-xs rounded-full border border-pink-400 focus:outline-none" onchange="saveKey()">
        <div class="flex gap-2 mt-2">
            <select id="gradeSelect" class="flex-1 bg-white p-1.5 rounded-full text-xs font-bold shadow">
                <option value="Lớp 12" selected>Lớp 12</option>
                <option value="Lớp 11">Lớp 11</option><option value="Lớp 10">Lớp 10</option><option value="Lớp 9">Lớp 9</option>
            </select>
            <select id="subjectSelect" class="flex-1 bg-white p-1.5 rounded-full text-xs font-bold shadow">
                <option value="Toán Học">Toán</option><option value="Ngữ Văn">Văn</option><option value="Tiếng Anh">Anh</option>
                <option value="Vật Lý">Lý</option><option value="Hóa Học">Hóa</option><option value="Sinh Học">Sinh</option>
                <option value="Lịch Sử">Sử</option><option value="Địa Lý">Địa</option>
            </select>
        </div>
    </div>

    <div id="chatBox" class="flex-1 p-4 overflow-y-auto space-y-4">
        <div class="bg-white p-3 rounded-2xl shadow-sm text-sm text-gray-700 border-l-4 border-pink-400">
            Chào bạn! Tớ đã cài đặt chế độ giải bài tập chuẩn form, ngắn gọn, súc tích. Hãy gửi câu hỏi nhé!
        </div>
    </div>

    <div class="bg-white p-3 border-t border-pink-200 sticky bottom-0">
        <div id="imagePreview" class="mb-2 hidden"></div>
        <div class="flex items-center gap-2">
            <label for="fileInput" class="bg-pink-100 p-3 rounded-full cursor-pointer">📷</label>
            <input id="fileInput" type="file" accept="image/*" class="hidden">
            <input id="userInput" type="text" placeholder="Nhập bài..." class="flex-1 border rounded-full px-4 py-2 text-sm focus:outline-none">
            <button id="sendBtn" class="bg-pink-500 text-white px-5 py-2 rounded-full font-bold text-sm">GỬI</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const fileInput = document.getElementById('fileInput');
        const imagePreview = document.getElementById('imagePreview');
        const gradeSelect = document.getElementById('gradeSelect');
        const subjectSelect = document.getElementById('subjectSelect');

        let base64Image = null; let imageMimeType = null;
        window.onload = () => { if(localStorage.getItem('user_gemini_key')) apiKeyInput.value = localStorage.getItem('user_gemini_key'); }
        function saveKey() { localStorage.setItem('user_gemini_key', apiKeyInput.value.trim()); }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                imageMimeType = file.type;
                const reader = new FileReader();
                reader.onload = (event) => {
                    base64Image = event.target.result.split(',')[1];
                    imagePreview.innerHTML = `<img src="${event.target.result}" class="h-12 w-12 rounded-lg">`;
                    imagePreview.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        sendBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) { alert("Dán API Key!"); return; }
            const text = userInput.value.trim();
            if (!text && !base64Image) return;

            // Hiển thị user message
            const userMsg = document.createElement('div');
            userMsg.className = "bg-pink-400 text-white p-3 rounded-2xl ml-auto text-sm max-w-[80%]";
            userMsg.innerText = text;
            chatBox.appendChild(userMsg);

            userInput.value = ''; imagePreview.classList.add('hidden');
            const tempText = text; const tempBase64 = base64Image; const tempMime = imageMimeType;
            base64Image = null;

            const loading = document.createElement('div');
            loading.className = "text-xs text-gray-400 italic"; loading.innerText = "Đang giải...";
            chatBox.appendChild(loading);

            // CẤU HÌNH LỆNH HỆ THỐNG MỚI (CHUẨN FORM, GỌN GÀNG)
            const systemPrompt = `Bạn là gia sư. Khi giải bài tập, BẮT BUỘC tuân thủ định dạng sau:
            1. Tóm tắt kiến thức (ngắn gọn nhất).
            2. Các bước giải (dùng số 1, 2, 3.. liệt kê rõ ràng).
            3. Đáp số cuối cùng.
            KHÔNG rườm rà, KHÔNG văn mẫu. Đi thẳng vào lời giải. Tối giản các biểu tượng trang trí.`;

            try {
                const parts = [{ text: `${systemPrompt}\n\nBài tập: ${tempText || "Giải bài này"}` }];
                if (tempBase64) parts.push({ inlineData: { mimeType: tempMime, data: tempBase64 } });

                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
                    body: JSON.stringify({ contents: [{ parts }] })
                });

                const data = await response.json();
                loading.remove();
                const aiDiv = document.createElement('div');
                aiDiv.className = "bg-white p-4 rounded-2xl shadow-sm text-sm border-l-4 border-pink-400 whitespace-pre-line text-gray-800";
                aiDiv.innerText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Có lỗi xảy ra.";
                chatBox.appendChild(aiDiv);
            } catch (e) { loading.innerText = "Lỗi kết nối."; }
        });
    </script>
</body>
</html>
