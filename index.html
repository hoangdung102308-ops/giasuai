<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Sư AI - Học Tập Miễn Phí</title>
    <!-- Tải thư viện giao diện siêu nhẹ Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col justify-between font-sans">

    <!-- Thanh Tiêu Đề Cố Định Phía Trên -->
    <div class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
        <h1 class="text-lg font-bold text-center mb-2">🧑‍🏫 GIA SƯ ẢO AI TOÀN DIỆN (LỚP 1 - 12)</h1>
        
        <!-- Ô Nhập API Key Bảo Mật -->
        <div class="max-w-md mx-auto mb-3">
            <input id="apiKeyInput" type="password" placeholder="Dán mã API Gemini của bạn vào đây để kích hoạt giáo viên..." class="w-full p-2 text-xs rounded border text-gray-800 focus:outline-none shadow-inner" onchange="saveKey()">
            <p class="text-[11px] text-blue-200 mt-1 text-center">Mã được lưu an toàn trên trình duyệt máy này, không lo bị lộ.</p>
        </div>

        <!-- Bộ Lọc Chọn Lớp & Môn Học Theo Bộ Giáo Dục -->
        <div class="flex gap-2 justify-center max-w-md mx-auto">
            <select id="gradeSelect" class="flex-1 bg-white text-gray-800 p-2 rounded-md text-sm font-semibold shadow">
                <option value="Lớp 1">Lớp 1</option><option value="Lớp 2">Lớp 2</option>
                <option value="Lớp 3">Lớp 3</option><option value="Lớp 4">Lớp 4</option>
                <option value="Lớp 5">Lớp 5</option><option value="Lớp 6">Lớp 6</option>
                <option value="Lớp 7">Lớp 7</option><option value="Lớp 8">Lớp 8</option>
                <option value="Lớp 9">Lớp 9</option><option value="Lớp 10">Lớp 10</option>
                <option value="Lớp 11">Lớp 11</option><option value="Lớp 12" selected>Lớp 12</option>
            </select>
            <select id="subjectSelect" class="flex-1 bg-white text-gray-800 p-2 rounded-md text-sm font-semibold shadow">
                <option value="Toán Học">Toán Học</option>
                <option value="Ngữ Văn">Ngữ Văn / Tiếng Việt</option>
                <option value="Tiếng Anh">Tiếng Anh</option>
                <option value="Vật Lý">Vật Lý</option>
                <option value="Hóa Học">Hóa Học</option>
                <option value="Sinh Học">Sinh Học</option>
                <option value="Lịch Sử">Lịch Sử</option>
                <option value="Địa Lý">Địa Lý</option>
            </select>
        </div>
    </div>

    <!-- Khung Hiển Thị Nội Dung Trò Chuyện (Tự cuộn khi tin nhắn dài) -->
    <div id="chatBox" class="flex-1 p-4 overflow-y-auto space-y-4 max-w-2xl w-full mx-auto">
        <div class="bg-blue-100 text-blue-800 p-3 rounded-lg max-w-[85%] shadow-sm text-sm">
            Chào em! Thầy/Cô là Gia sư trí tuệ nhân tạo. Hãy điền mã API vào ô phía trên (chỉ cần điền một lần đầu), sau đó chọn Lớp và Môn học để bắt đầu trao đổi bài tập nhé!
        </div>
    </div>

    <!-- Thanh Nhập Câu Hỏi Phía Dưới Cùng -->
    <div class="bg-white p-3 border-t border-gray-200 sticky bottom-0">
        <div class="max-w-2xl mx-auto flex gap-2">
            <input id="userInput" type="text" placeholder="Nhập câu hỏi bài tập của em vào đây..." class="flex-1 border rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 shadow-sm">
            <button id="sendBtn" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold text-sm hover:bg-blue-700 transition shadow">GỬI</button>
        </div>
    </div>

    <!-- Đoạn Code Xử Lý Logic Kết Nối Với Google AI -->
    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const gradeSelect = document.getElementById('gradeSelect');
        const subjectSelect = document.getElementById('subjectSelect');
        const apiKeyInput = document.getElementById('apiKeyInput');

        // Kiểm tra xem máy này trước đây đã từng nhập key chưa, nếu có thì tự điền lại
        window.onload = function() {
            const savedKey = localStorage.getItem('user_gemini_key');
            if (savedKey) { apiKeyInput.value = savedKey; }
        }

        // Lưu API Key vào bộ nhớ riêng của trình duyệt web trên máy học sinh
        function saveKey() {
            localStorage.setItem('user_gemini_key', apiKeyInput.value.trim());
        }

        // Xử lý khi bấm nút GỬI
        sendBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                alert("Em hãy dán mã API Gemini vào ô phía trên trước khi đặt câu hỏi nhé!");
                return;
            }

            const text = userInput.value.trim();
            if (!text) return;

            // Hiện câu hỏi học sinh lên màn hình
            appendMessage(text, 'user');
            userInput.value = '';

            // Hiện dòng chữ chờ đợi
            const loadingId = appendMessage("Thầy/Cô đang suy nghĩ...", 'ai-loading');
            const grade = gradeSelect.value;
            const subject = subjectSelect.value;

            // Kịch bản (Prompt) ép AI làm giáo viên chuẩn Việt Nam
            const systemPrompt = `Bạn là một giáo viên, gia sư ảo chuyên nghiệp tại Việt Nam. Bạn đang dạy một học sinh học ${grade}, môn ${subject} theo đúng khung chương trình chuẩn hiện hành của Bộ Giáo dục và Đào tạo Việt Nam. Nhiệm vụ của bạn: Trả lời bằng tiếng Việt, giọng điệu ân cần, dễ hiểu phù hợp đúng lứa tuổi của ${grade}. Khi học sinh hỏi bài tập, TUYỆT ĐỐI không giải hộ ngay lập tức, mà hãy hướng dẫn từng bước nhỏ gợi ý, đặt câu hỏi ngược lại để học sinh tự tư duy và tìm ra đáp án.`;

            try {
                // Gửi dữ liệu lên máy chủ Google bằng phương thức Fetch siêu nhẹ
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `${systemPrompt}\n\nHọc sinh hỏi: ${text}` }] }]
                    })
                });
                
                const data = await response.json();
                document.getElementById(loadingId).remove(); // Xóa dòng chữ chờ đi
                
                if(data.error) {
                    appendMessage("Lỗi hệ thống: Hãy kiểm tra lại mã API xem nhập đúng chưa, hoặc kiểm tra kết nối mạng.", 'ai');
                    return;
                }
                
                // Hiển thị câu trả lời của Giáo viên AI
                const aiReply = data.candidates[0].content.parts[0].text;
                appendMessage(aiReply, 'ai');
            } catch (error) {
                document.getElementById(loadingId).innerText = "Lỗi kết nối rồi. Em hãy kiểm tra mạng internet nhé.";
            }
        });

        // Hàm định dạng tin nhắn chat
        function appendMessage(text, sender) {
            const id = 'msg-' + Date.now();
            const msgDiv = document.createElement('div');
            msgDiv.id = id;
            if (sender === 'user') {
                msgDiv.className = "bg-green-500 text-white p-3 rounded-lg max-w-[85%] ml-auto text-left shadow-sm break-words text-sm";
            } else if (sender === 'ai-loading') {
                msgDiv.className = "bg-gray-200 text-gray-500 p-3 rounded-lg max-w-[85%] italic text-sm";
            } else {
                msgDiv.className = "bg-white text-gray-800 p-3 rounded-lg max-w-[85%] border shadow-sm space-y-1 break-words text-sm";
            }
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight; // Tự động cuộn xuống tin nhắn mới nhất
            return id;
        }

        // Nhấn phím Enter trên bàn phím cũng tương đương bấm nút gửi
        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendBtn.click(); });
    </script>
</body>
</html>
