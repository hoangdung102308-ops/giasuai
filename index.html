<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Sư AI - Học Tập Miễn Phí</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col justify-between font-sans">
    <div class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
        <h1 class="text-lg font-bold text-center mb-2">🧑‍🏫 GIA SƯ ẢO AI TOÀN DIỆN</h1>
        <div class="max-w-md mx-auto mb-3">
            <input id="apiKeyInput" type="password" placeholder="Dán mã API Gemini vào đây..." class="w-full p-2 text-xs rounded border text-gray-800 focus:outline-none shadow-inner" onchange="saveKey()">
        </div>
        <div class="flex gap-2 justify-center max-w-md mx-auto">
            <select id="gradeSelect" class="flex-1 bg-white text-gray-800 p-2 rounded-md text-sm font-semibold shadow">
                <option value="Lớp 12" selected>Lớp 12</option><option value="Lớp 11">Lớp 11</option><option value="Lớp 10">Lớp 10</option>
                <option value="Lớp 9">Lớp 9</option><option value="Lớp 8">Lớp 8</option><option value="Lớp 7">Lớp 7</option>
                <option value="Lớp 6">Lớp 6</option><option value="Lớp 5">Lớp 5</option>
            </select>
            <select id="subjectSelect" class="flex-1 bg-white text-gray-800 p-2 rounded-md text-sm font-semibold shadow">
                <option value="Toán Học">Toán Học</option><option value="Ngữ Văn">Văn</option>
                <option value="Tiếng Anh">Tiếng Anh</option><option value="Vật Lý">Lý</option>
            </select>
        </div>
    </div>
    <div id="chatBox" class="flex-1 p-4 overflow-y-auto space-y-4 max-w-2xl w-full mx-auto">
        <div class="bg-blue-100 text-blue-800 p-3 rounded-lg max-w-[85%] shadow-sm text-sm">Chào em! Hãy nhập API Key và hỏi bài nhé.</div>
    </div>
    <div class="bg-white p-3 border-t sticky bottom-0">
        <div class="max-w-2xl mx-auto flex gap-2">
            <input id="userInput" type="text" placeholder="Nhập câu hỏi..." class="flex-1 border rounded-lg px-4 py-2 text-sm focus:outline-none shadow-sm">
            <button id="sendBtn" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold text-sm">GỬI</button>
        </div>
    </div>
    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const apiKeyInput = document.getElementById('apiKeyInput');
        window.onload = () => { if(localStorage.getItem('user_gemini_key')) apiKeyInput.value = localStorage.getItem('user_gemini_key'); }
        function saveKey() { localStorage.setItem('user_gemini_key', apiKeyInput.value.trim()); }
        sendBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) { alert("Vui lòng nhập API Key!"); return; }
            const text = userInput.value.trim();
            if (!text) return;
            const msgDiv = document.createElement('div'); msgDiv.className = "bg-green-500 text-white p-3 rounded-lg ml-auto max-w-[85%] text-sm"; msgDiv.innerText = text; chatBox.appendChild(msgDiv); userInput.value = '';
            try {
                // ĐÃ SỬA: Chuyển v1beta thành v1 để sửa lỗi không tìm thấy mô hình của Google
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await response.json();
                const aiDiv = document.createElement('div'); aiDiv.className = "bg-white p-3 rounded-lg border max-w-[85%] text-sm";
                aiDiv.innerText = data.error ? "Lỗi: " + data.error.message : data.candidates[0].content.parts[0].text;
                chatBox.appendChild(aiDiv); chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) { alert("Lỗi kết nối"); }
        });
    </script>
</body>
</html>
